<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Antenna -->
  <line x1="32" y1="4" x2="32" y2="14" stroke="#0284c7" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="4" r="3" fill="#0ea5e9"/>
  <!-- Head -->
  <rect x="14" y="14" width="36" height="28" rx="6" fill="#0284c7"/>
  <rect x="16" y="16" width="32" height="24" rx="4" fill="#e0f2fe"/>
  <!-- Eyes -->
  <circle cx="24" cy="27" r="4.5" fill="#0284c7"/>
  <circle cx="40" cy="27" r="4.5" fill="#0284c7"/>
  <circle cx="25" cy="25.5" r="1.5" fill="white"/>
  <circle cx="41" cy="25.5" r="1.5" fill="white"/>
  <!-- Mouth -->
  <rect x="24" y="33" width="16" height="3" rx="1.5" fill="#0284c7"/>
  <!-- Ears -->
  <rect x="8" y="22" width="6" height="12" rx="3" fill="#0284c7"/>
  <rect x="50" y="22" width="6" height="12" rx="3" fill="#0284c7"/>
  <!-- Body -->
  <rect x="20" y="44" width="24" height="14" rx="4" fill="#0284c7"/>
  <rect x="22" y="46" width="20" height="10" rx="2" fill="#e0f2fe"/>
  <!-- Body detail - signal waves -->
  <path d="M28 51 Q32 47 36 51" stroke="#0284c7" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M30 53 Q32 50 34 53" stroke="#0284c7" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Arms -->
  <rect x="12" y="44" width="6" height="10" rx="3" fill="#0284c7"/>
  <rect x="46" y="44" width="6" height="10" rx="3" fill="#0284c7"/>
</svg>
